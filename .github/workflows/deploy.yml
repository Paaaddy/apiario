name: Deploy to GitHub Pages

on:
  push:
    branches: [master]
    paths:
      - 'src/**'
      - 'public/**'
      - 'index.html'
      - 'package.json'
      - 'package-lock.json'
      - 'vite.config.*'
      - 'tailwind.config.*'
      - 'postcss.config.*'
  # Run the `build` job on PRs targeting master too so branch
  # protection's required check is satisfied. The `deploy` job below
  # is gated on `github.event_name == 'push'`, so PR builds verify
  # the artifact compiles without shipping anything to Pages.
  pull_request:
    branches: [master]
    paths:
      - 'src/**'
      - 'public/**'
      - 'index.html'
      - 'package.json'
      - 'package-lock.json'
      - 'vite.config.*'
      - 'tailwind.config.*'
      - 'postcss.config.*'
      - '.github/workflows/deploy.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# GitHub's official recommendation for the `pages` concurrency group:
# do NOT cancel in-progress deployments. Cancelling a Pages deployment
# can leave the environment in a half-applied state, so the Actions UI
# surfaces a warning on every run that sets `cancel-in-progress: true`
# on a Pages job. Keep it false, let the queue drain naturally.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          # Current active LTS. Node 20 is still supported but 22 is
          # the version everything in this repo targets today.
          node-version: 22
          cache: npm
          cache-dependency-path: package-lock.json

      # --no-audit --no-fund silences the audit summary and funding
      # footer that were showing up as warnings in CI. --prefer-offline
      # is harmless when the npm cache is cold and speeds up the step
      # when it is warm.
      - run: npm ci --no-audit --no-fund --prefer-offline

      - run: npm run build -- --base /apiario/

      # Only ship the artifact when this run was triggered by a push to
      # master (or a manual dispatch). PR builds stop at the build step
      # — they verify the artifact compiles, nothing more.
      - if: github.event_name != 'pull_request'
        uses: actions/upload-pages-artifact@v5
        with:
          path: dist

  deploy:
    needs: build
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/deploy-pages@v5
        id: deployment
